<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Departure | Udeze Preston</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arsenal-red: #ff3e3e;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.95);
            --bg: #080808;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, #1a0505 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #050a1a 0%, transparent 40%);
            height: 100vh;
            width: 100vw;
            display: grid;
            place-items: center; /* Modern centering */
            overflow: hidden;
            perspective: 1200px;
            font-family: 'Inter', sans-serif;
        }

        /* Modern Centered Trigger */
        #launch-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px 40px;
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.5s;
            z-index: 10;
        }

        #launch-btn:hover {
            background: var(--arsenal-red);
            box-shadow: 0 0 50px rgba(255, 62, 62, 0.4);
            border-color: var(--arsenal-red);
        }

        /* The Modern Letter Box */
        .letter-card {
            display: none;
            width: 90%;
            max-width: 580px;
            background: var(--glass);
            padding: clamp(40px, 10vw, 80px);
            border-radius: 2px;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.8),
                inset 0 0 0 1px rgba(255,255,255,0.5);
            position: relative;
            transform-style: preserve-3d;
            color: #111;
        }

        .red-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--arsenal-red), #800000);
        }

        .meta-info {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #666;
            font-weight: 700;
            border-left: 2px solid var(--arsenal-red);
            padding-left: 15px;
        }

        .message-content {
            font-family: 'EB Garamond', serif;
            font-size: clamp(1.2rem, 3.5vw, 1.5rem);
            line-height: 1.5;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .char { display: inline-block; will-change: transform, opacity; }

        .sig-wrap {
            margin-top: 60px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .name-style {
            display: block;
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.6rem;
            background: linear-gradient(45deg, #111, var(--arsenal-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }

        /* Subtle Paper Grain Overlay */
        .letter-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <button id="launch-btn">EXECUTE DEPARTURE</button>

    <div class="letter-card" id="letter">
        <div class="red-line"></div>
        
        <div class="meta-info">
            Ref: Fanbase Termination<br>
            To: Mikel Arteta | Arsenal FC
        </div>

        <div class="message-content" id="msg">
            The process has been exhausted. I, Udeze Preston, am officially terminating my allegiance to Arsenal. The final whistle has blown.
        </div>

        <div class="sig-wrap">
            <span style="font-size: 0.9rem; font-style: italic;">Signed,</span>
            <span class="name-style" id="name">Udeze Preston</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        const btn = document.querySelector('#launch-btn');
        const letter = document.querySelector('#letter');
        const msg = document.querySelector('#msg');
        const name = document.querySelector('#name');

        function prep(el) {
            el.innerHTML = el.innerText.split("").map(c => 
                `<span class="char">${c === " " ? "&nbsp;" : c}</span>`
            ).join("");
        }

        prep(msg);
        prep(name);

        btn.addEventListener('click', () => {
            gsap.to(btn, { y: 20, opacity: 0, duration: 0.4, ease: "power2.in" });

            const tl = gsap.timeline();

            tl.set(letter, { display: 'block', scale: 0.9, opacity: 0, rotationX: -10 })
              .to(letter, {
                  opacity: 1,
                  scale: 1,
                  rotationX: 0,
                  duration: 1,
                  ease: "expo.out"
              })
              .fromTo(".char", 
                { opacity: 0, y: 30, rotationX: 90 },
                { opacity: 1, y: 0, rotationX: 0, duration: 0.8, stagger: 0.015, ease: "power3.out" },
                "-=0.5"
              );

            // High-End Tilt Logic
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.clientX) / 40;
                const y = (window.innerHeight / 2 - e.clientY) / 40;
                gsap.to(letter, { rotationY: x, rotationX: -y, duration: 1 });
            });
        });
    </script>
</body>
</html>
