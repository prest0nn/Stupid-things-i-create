<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsenal | Thirsty For Victory</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;600&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arsenal-red: #DB0007;
            --gold: #9C824A;
            --white: #ffffff;
            --dark: #0d0d0d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--arsenal-red);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Top Navigation Button */
        .nav-link {
            position: fixed;
            top: 30px;
            right: 50px;
            z-index: 100;
        }

        .btn-outline {
            padding: 10px 25px;
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-outline:hover {
            background: white;
            color: var(--arsenal-red);
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Pushes content left and image right */
            position: relative;
            padding: 0 10%;
        }

        .bg-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Montserrat', sans-serif;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            z-index: 1;
            user-select: none;
            white-space: nowrap;
            pointer-events: none;
        }

        /* Image moved to the RIGHT */
        .can-container {
            position: relative;
            z-index: 5;
            width: clamp(250px, 30vw, 450px);
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.6));
            will-change: transform;
            margin-right: -5%; /* Slight offset for style */
        }

        .can-container img {
            width: 100%;
            display: block;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        /* Content Text on the LEFT */
        .content {
            position: relative;
            z-index: 10;
            max-width: 500px;
        }

        .content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-left: 8px solid var(--gold);
            padding-left: 20px;
        }

        .content p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            display: inline-block;
            background: var(--white);
            color: var(--arsenal-red);
            padding: 18px 40px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-gold {
            background: var(--gold);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            filter: brightness(1.1);
        }

        @media (max-width: 1024px) {
            .hero { flex-direction: column; justify-content: center; text-align: center; padding-top: 100px; }
            .content h1 { border-left: none; padding-left: 0; }
            .btn-group { justify-content: center; }
            .can-container { width: 220px; margin-right: 0; margin-top: 40px; }
            .nav-link { right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

    <div class="nav-link">
        <a href="#" class="btn-outline">Official Site</a>
    </div>

    <div class="hero">
        <div class="bg-text" id="bg-move">Arsenal</div>

        <div class="content" id="text-anim">
            <h1>Thirsty For Water</h1>
            <p>We are hiring Bottle covers Today. Come join us, it's free. Earn $55.66 monthly while supporting the Gunners.</p>
            <div class="btn-group">
                <a href="#" class="btn btn-gold">Apply Now</a>
                <a href="https://arsenaldirect.arsenal.com/" target="_blank" class="btn">Shop Gear</a>
            </div>
        </div>

        <div class="can-container" id="can">
            <img src="Ozil-Arsenal-PNG-Photos.png" alt="Arsenal Player" id="can-img">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        // Placeholder fallback
        window.onload = () => {
            const img = document.querySelector('#can-img');
            img.onerror = () => {
                img.src = 'https://purepng.com/public/uploads/large/purepng.com-pepsi-canpepsidrinkscolasoda-1411527233291pujit.png'; 
            };
        };

        const tl = gsap.timeline();

        // Reveal animations
        tl.from(".can-container", {
            x: 200,
            opacity: 0,
            duration: 1.5,
            ease: "expo.out"
        })
        .from("#text-anim h1, #text-anim p, #text-anim .btn-group", {
            x: -100,
            opacity: 0,
            stagger: 0.2,
            duration: 1,
            ease: "power3.out"
        }, "-=1")
        .from(".nav-link", {
            y: -50,
            opacity: 0,
            duration: 0.5
        }, "-=0.5");

        // Subtle Float
        gsap.to("#can", {
            y: "-=25",
            rotation: "+=2",
            duration: 4,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });

        // 3D Parallax
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener("mousemove", (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 60;
                const y = (window.innerHeight / 2 - e.pageY) / 60;

                gsap.to("#bg-move", { x: x * 1.5, y: y * 1.5, duration: 1 });
                gsap.to("#can", { rotationY: x * 3, rotationX: -y * 3, duration: 1 });
            });
        }

        // Bubbles
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 25 + 5;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.top = `${Math.random() * 100}%`;
            document.body.appendChild(bubble);

            gsap.to(bubble, {
                y: "-=150",
                opacity: 0,
                scale: 1.2,
                duration: Math.random() * 4 + 3,
                repeat: -1,
                ease: "none",
                delay: Math.random() * 5
            });
        }
    </script>
</body>
</html>
