<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsenal | Thirsty For Victory</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;600&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arsenal-red: #DB0007; /* Official Arsenal Red */
            --gold: #9C824A;        /* Official Accent Gold */
            --white: #ffffff;
            --dark: #0d0d0d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--arsenal-red);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 10%;
        }

        /* Large Background Text - Crucial Change */
        .bg-text {
            position: absolute;
            font-family: 'Montserrat', sans-serif;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05); /* Very faint white */
            z-index: 1;
            user-select: none;
            white-space: nowrap;
        }

        /* The Product Can (Arsenal Branded) */
        .can-container {
            position: relative;
            z-index: 5;
            width: clamp(200px, 20vw, 300px);
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.6));
            will-change: transform;
        }

        .can-container img {
            width: 100%;
            display: block;
        }

        /* Floating Bubbles (Still fits the 'soda' vibe) */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        /* Content Text (Arsenal Branding) */
        .content {
            position: absolute;
            left: 10%;
            z-index: 10;
            max-width: 450px;
        }

        .content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-left: 5px solid var(--gold);
            padding-left: 15px;
        }

        .content p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 30px;
            font-family: 'Poppins', sans-serif;
        }

        .btn {
            display: inline-block;
            background: var(--white);
            color: var(--arsenal-red);
            padding: 15px 35px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background: var(--gold);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero { flex-direction: column-reverse; text-align: center; }
            .content { position: relative; left: 0; margin-bottom: 50px; }
            .can-container { width: 180px; margin-bottom: 30px; }
            .content h1 { font-size: 2.5rem; border-left: none; padding-left: 0; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="bg-text" id="bg-move">Arsenal</div>

        <div class="content" id="text-anim">
            <h1>Thirsty For Victory</h1>
            <p>Victory Through Harmony. Experience the classic, refreshing taste that powers the faithful Gooners.</p>
            <a href="https://arsenaldirect.arsenal.com/" target="_blank" class="btn">Shop Gear</a>
        </div>

        <div class="can-container" id="can">
            <img src="https:// purepng.com/public/uploads/large/purepng.com-pepsi-canpepsidrinkscolasoda-1411527233291pujit.png" alt="Branded Can" id="can-img">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        // Use a generic placeholder if the specific can image fails
        window.onload = () => {
            const img = document.querySelector('#can-img');
            img.onerror = () => {
                img.src = 'https://purepng.com/public/uploads/large/purepng.com-pepsi-canpepsidrinkscolasoda-1411527233291pujit.png'; 
                // Note: The imagery here is a general soda can. In a real project, you would use a branded Arsenal soda can mockup.
            };
        };

        // 1. Initial Animation on Load
        const tl = gsap.timeline();

        tl.from(".can-container", {
            y: 500,
            rotation: 45,
            duration: 1.5,
            ease: "expo.out"
        })
        .from("#text-anim h1, #text-anim p, #text-anim .btn", {
            x: -100,
            opacity: 0,
            stagger: 0.2,
            duration: 1,
            ease: "power3.out"
        }, "-=1");

        // 2. Floating Can Idle Animation (Slightly 'heavy' floating)
        gsap.to("#can", {
            y: "-=30",
            rotation: "+=3",
            duration: 4,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });

        // 3. Mouse Move 3D Parallax Interaction
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener("mousemove", (e) => {
                // Calculate position relative to center
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;

                // Move the Background Text (Very Subtle)
                gsap.to("#bg-move", {
                    x: x,
                    y: y,
                    duration: 1,
                    ease: "power1.out"
                });

                // Tilt the Can (Responsive 3D rotation)
                gsap.to("#can", {
                    rotationY: x * 2.5, // How much it turns sideways
                    rotationX: -y * 2.5, // How much it tilts up/down
                    duration: 1,
                    ease: "power2.out"
                });
            });
        }

        // 4. Create Floating Carbonation Bubbles
        for (let i = 0; i < 20; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 30 + 10; // Random size
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.top = `${Math.random() * 100}%`;
            document.body.appendChild(bubble);

            gsap.to(bubble, {
                y: "-=100", // Float Upward
                opacity: 0,
                scale: 1.5,
                duration: Math.random() * 3 + 2,
                repeat: -1,
                ease: "none",
                delay: Math.random() * 5
            });
        }
    </script>
</body>
</html>
