<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsenal | The Global Bottling Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arsenal-red: #DB0007;
            --gold: #9C824A;
            --white: #ffffff;
            --glitch-color: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--arsenal-red);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: crosshair;
        }

        /* Live Counter */
        .live-counter {
            position: fixed;
            top: 15px;
            left: 15px;
            font-family: 'Space Mono', monospace;
            background: rgba(0,0,0,0.8);
            padding: 8px 15px;
            border-left: 4px solid var(--gold);
            z-index: 100;
            font-size: 0.8rem;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: row; /* Desktop Default */
            align-items: center;
            justify-content: space-between;
            position: relative;
            padding: 80px 10%;
            gap: 40px;
        }

        /* Responsive Background Text */
        .bg-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Montserrat', sans-serif;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.08);
            z-index: 1;
            user-select: none;
            white-space: nowrap;
            pointer-events: none;
        }

        .can-container {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
        }

        .can-container img {
            width: 100%;
            max-width: 450px;
            height: auto;
            display: block;
        }

        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            max-width: 550px;
        }

        .content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.2rem, 5vw, 4.2rem);
            line-height: 0.95;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        .content p {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-group { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
        }

        .btn {
            flex: 1;
            min-width: 200px;
            text-align: center;
            background: var(--white);
            color: var(--arsenal-red);
            padding: 15px 25px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-danger { 
            background: #000; 
            color: white; 
            border: 1px solid var(--white); 
        }

        .tear {
            position: absolute;
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 2;
        }

        /* RESPONSIVE BREAKPOINT */
        @media (max-width: 900px) {
            .hero {
                flex-direction: column-reverse; /* Content on top of image for mobile */
                text-align: center;
                padding-top: 100px;
            }
            .content h1 { margin-top: 20px; }
            .btn-group { justify-content: center; }
            .can-container img { max-width: 280px; }
            .bg-text { font-size: 30vw; }
        }
    </style>
</head>
<body>

    <div class="live-counter">
        TEARS SHED: <span id="pts">00</span>L
    </div>

    <div class="hero">
        <div class="bg-text" id="bg-move">CHOKE</div>

        <div class="content" id="text-anim">
            <h1>The Art of Doing Stuff Gng🦾</h1>
            
            <div class="stats-grid">
                <div class="stat-box">EXPECTATION: To be viral</div>
                <div class="stat-box">REALITY: Vibes</div>
                <div class="stat-box">LEAD: No yellow Ref gave me black</div>
                <div class="stat-box">STATUS: Choking...</div>
            </div>

            <p>Hi, I am Preston, Just In Nigeria, Doing sm tech (DAMN)I wish this could go viral</p>
            
            <div class="btn-group">
                <a href="#" class="btn" onmouseover="glitch(this)" onmouseout="stopGlitch(this)">Pre-order Tissues</a>
                <a href="#" class="btn btn-danger">Buy me Coffee</a>
            </div>
        </div>

        <div class="can-container" id="can">
            <img src="Dave-Bautista-Transparent-File.png" alt="Arsenal" id="can-img">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        // Handle image error
        window.onload = () => {
            const img = document.querySelector('#can-img');
            img.onerror = () => {
                img.src = 'https://purepng.com/public/uploads/large/purepng.com-pepsi-canpepsidrinkscolasoda-1411527233291pujit.png'; 
            };
        };

        // Glitch Logic
        function glitch(el) {
            gsap.to(el, { duration: 0.1, x: "random(-4, 4)", y: "random(-4, 4)", repeat: -1, yoyo: true });
        }
        function stopGlitch(el) {
            gsap.killTweensOf(el);
            gsap.to(el, { x: 0, y: 0, duration: 0.2 });
        }

        // Counter
        let count = 0;
        setInterval(() => {
            count += 5;
            document.getElementById('pts').innerText = count.toString().padStart(2, '0');
        }, 2000);

        const tl = gsap.timeline();

        // Entry
        tl.from(".content > *", { y: 50, opacity: 0, stagger: 0.15, ease: "power4.out", duration: 1 })
          .from("#can", { scale: 0.5, opacity: 0, duration: 1, ease: "back.out(1.7)" }, "-=0.5");

        // Violent Hover Shake
        const can = document.querySelector("#can");
        can.addEventListener("mouseenter", () => {
            gsap.to(can, { x: "random(-8, 8)", y: "random(-8, 8)", repeat: -1, duration: 0.05, yoyo: true });
            gsap.to("body", { backgroundColor: "#800000", duration: 0.3 });
        });

        can.addEventListener("mouseleave", () => {
            gsap.killTweensOf(can);
            gsap.to(can, { x: 0, y: 0, duration: 0.5 });
            gsap.to("body", { backgroundColor: "#DB0007", duration: 0.5 });
        });

        // Parallax
        document.addEventListener("mousemove", (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 50;
            const y = (e.clientY - window.innerHeight / 2) / 50;
            gsap.to("#bg-move", { x: -x * 2, y: -y * 2, duration: 1 });
            gsap.to("#can", { rotationY: x * 2, rotationX: -y * 2, duration: 1 });
        });

        // Falling Tears
        function createTear() {
            const tear = document.createElement('div');
            tear.className = 'tear';
            tear.style.left = Math.random() * window.innerWidth + 'px';
            tear.style.top = '-20px';
            document.body.appendChild(tear);

            gsap.to(tear, {
                y: window.innerHeight + 50,
                duration: Math.random() * 1 + 0.5,
                ease: "none",
                onComplete: () => tear.remove()
            });
        }
        setInterval(createTear, 150);
    </script>
</body>
</html>
