<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bestie</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a; /* Dark sleek background */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            text-align: center;
            position: relative;
        }

        #open-btn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
            transition: transform 0.2s;
            z-index: 10;
        }

        #open-btn:hover {
            transform: scale(1.05);
        }

        .message-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            pointer-events: none;
        }

        .message {
            font-size: 4rem;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Essential for GSAP animation */
        .letter {
            display: inline-block;
            opacity: 0;
            will-change: transform;
        }

        .highlight {
            color: #ff4757;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="open-btn">Click for a Surprise 🎁</button>
        
        <div class="message-container">
            <h1 class="message" id="target-text">You are my Favorite Person!</h1>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        const textElement = document.querySelector('#target-text');
        const btn = document.querySelector('#open-btn');

        // 1. Break the text into individual letters so GSAP can grab them
        const words = textElement.textContent.split(" ");
        textElement.innerHTML = ""; // Clear original text

        words.forEach(word => {
            const wordSpan = document.createElement("span");
            wordSpan.style.whiteSpace = "nowrap"; // Keep words together
            
            word.split("").forEach(char => {
                const letterSpan = document.createElement("span");
                letterSpan.className = "letter";
                letterSpan.innerHTML = char;
                wordSpan.appendChild(letterSpan);
            });
            
            textElement.appendChild(wordSpan);
            // Add space between words
            textElement.innerHTML += "&nbsp;";
        });

        // 2. The Animation Logic
        btn.addEventListener('click', () => {
            // Animate button away
            gsap.to(btn, { 
                scale: 0, 
                opacity: 0, 
                duration: 0.5, 
                ease: "back.in(1.7)" 
            });

            // The Exploding Letter Effect
            gsap.fromTo(".letter", 
                {
                    opacity: 0,
                    scale: 0,
                    // Random start positions (The "Explosion" origin)
                    x: () => (Math.random() - 0.5) * window.innerWidth * 1.5,
                    y: () => (Math.random() - 0.5) * window.innerHeight * 1.5,
                    rotation: () => Math.random() * 720 - 360,
                },
                {
                    opacity: 1,
                    scale: 1,
                    x: 0,
                    y: 0,
                    rotation: 0,
                    duration: 2,
                    stagger: {
                        amount: 0.8, // Total time spread across all letters
                        from: "random" // Makes the order of appearance feel organic
                    },
                    ease: "elastic.out(1, 0.75)" // Gives that bouncy "jello" finish
                }
            );
        });
    </script>
</body>
</html>
