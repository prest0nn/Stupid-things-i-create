<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reveal | Interactive Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The hidden layer (only visible via flashlight) */
        .reveal-layer {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ff0055, #7000ff);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* The Mask - The circle follows the mouse */
            mask-image: radial-gradient(circle 150px at var(--x) var(--y), black 100%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle 150px at var(--x) var(--y), black 0%, transparent 100%);
        }

        .content {
            color: white;
            font-size: clamp(3rem, 15vw, 10rem);
            line-height: 0.9;
            text-transform: uppercase;
            user-select: none;
        }

        /* The static dark layer text */
        .base-layer {
            position: absolute;
            color: #111;
            font-size: clamp(3rem, 15vw, 10rem);
            line-height: 0.9;
            text-transform: uppercase;
            text-align: center;
            z-index: 1;
        }

        .instruction {
            position: fixed;
            bottom: 40px;
            color: #444;
            letter-spacing: 2px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="base-layer">
        Move<br>To<br>Find
    </div>

    <div class="reveal-layer" id="reveal">
        <div class="content">
            Hidden<br>In<br>Dark
        </div>
    </div>

    <div class="instruction">Move your cursor to explore</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        const reveal = document.querySelector('#reveal');

        // Initial Position
        gsap.set(reveal, { "--x": "50%", "--y": "50%" });

        window.addEventListener('mousemove', (e) => {
            // Using GSAP quickSetter for high-performance mouse tracking
            const xPercent = (e.clientX / window.innerWidth) * 100;
            const yPercent = (e.clientY / window.innerHeight) * 100;

            gsap.to(reveal, {
                "--x": `${xPercent}%`,
                "--y": `${yPercent}%`,
                duration: 0.5,
                ease: "power2.out"
            });
        });

        // Add a "pulse" effect on click
        window.addEventListener('mousedown', () => {
            gsap.to(reveal, {
                maskImage: "radial-gradient(circle 300px at var(--x) var(--y), black 0%, transparent 100%)",
                "-webkit-mask-image": "radial-gradient(circle 300px at var(--x) var(--y), black 0%, transparent 100%)",
                duration: 0.3
            });
        });

        window.addEventListener('mouseup', () => {
            gsap.to(reveal, {
                maskImage: "radial-gradient(circle 150px at var(--x) var(--y), black 0%, transparent 100%)",
                "-webkit-mask-image": "radial-gradient(circle 150px at var(--x) var(--y), black 0%, transparent 100%)",
                duration: 0.3
            });
        });
    </script>
</body>
</html>
