<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Resignation - Udeze Preston</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arsenal-red: #DB0007;
            --gold: #9C824A;
            --paper: #f4f1ea;
            --ink: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* The Button */
        #reveal-btn {
            background: var(--arsenal-red);
            color: white;
            border: 2px solid var(--gold);
            padding: 20px 40px;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(219, 0, 7, 0.4);
            z-index: 100;
        }

        /* The Letter Container */
        .letter-wrap {
            position: absolute;
            width: 90%;
            max-width: 600px;
            background-color: var(--paper);
            padding: 60px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: none; /* Hidden until GSAP starts */
            border-top: 10px solid var(--arsenal-red);
        }

        .header {
            border-bottom: 1px solid #ddd;
            margin-bottom: 30px;
            padding-bottom: 10px;
            font-family: 'Cinzel', serif;
        }

        .recipient {
            font-weight: bold;
            color: var(--arsenal-red);
            margin-bottom: 20px;
            display: block;
        }

        .content {
            font-family: 'Playfair Display', serif;
            line-height: 1.6;
            font-size: 1.25rem;
            color: var(--ink);
        }

        .content p {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .signature-area {
            margin-top: 40px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .name {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            color: var(--ink);
            font-family: 'Cinzel', serif;
        }

        /* Letter class for GSAP explosion */
        .char {
            display: inline-block;
            opacity: 0;
        }

        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            opacity: 0.2;
            color: var(--gold);
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body>

    <button id="reveal-btn">Open Official Notice</button>

    <div class="letter-wrap" id="letter">
        <div class="header">Notice of Resignation</div>
        
        <span class="recipient">To: Mikel Arteta, Arsenal FC</span>

        <div class="content">
            <p id="main-message">
                I am writing to formally inform you that I am no longer an Arsenal fan. 
                The process has reached its conclusion.
            </p>
        </div>

        <div class="signature-area">
            Sincerely,<br>
            <span class="name" id="sig-name">Udeze Preston</span>
        </div>

        <div class="watermark">Final Decision 2026</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        const btn = document.querySelector('#reveal-btn');
        const letter = document.querySelector('#letter');
        const message = document.querySelector('#main-message');
        const sigName = document.querySelector('#sig-name');

        // Helper to split text into chars
        function splitToChars(element) {
            const text = element.textContent.trim();
            element.innerHTML = text.split("").map(char => 
                `<span class="char">${char === " " ? "&nbsp;" : char}</span>`
            ).join("");
        }

        splitToChars(message);
        splitToChars(sigName);

        btn.addEventListener('click', () => {
            // 1. Vanish the button
            gsap.to(btn, { scale: 0, opacity: 0, duration: 0.4 });

            // 2. Prepare the letter
            gsap.set(letter, { display: 'block', scale: 0.8, opacity: 0 });

            // 3. Animate the letter paper appearing
            const tl = gsap.timeline();

            tl.to(letter, {
                scale: 1,
                opacity: 1,
                duration: 1,
                ease: "power4.out"
            })
            // 4. Explode the text from random positions into place
            .fromTo(".char", 
                {
                    opacity: 0,
                    x: () => (Math.random() - 0.5) * 600,
                    y: () => (Math.random() - 0.5) * 600,
                    rotation: () => Math.random() * 360,
                    scale: 2
                },
                {
                    opacity: 1,
                    x: 0,
                    y: 0,
                    rotation: 0,
                    scale: 1,
                    duration: 1.5,
                    stagger: 0.01,
                    ease: "back.out(1.5)"
                }, 
                "-=0.5" // Start slightly before the letter finishes moving
            );
        });
    </script>
</body>
</html>
