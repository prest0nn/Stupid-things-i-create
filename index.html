<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepsi | Thirsty For More</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pepsi-blue: #005cb4;
            --pepsi-red: #ef3340;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--pepsi-blue);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 10%;
        }

        /* Large Background Text */
        .bg-text {
            position: absolute;
            font-family: 'Montserrat', sans-serif;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            z-index: 1;
            user-select: none;
            white-space: nowrap;
        }

        /* The Can */
        .can-container {
            position: relative;
            z-index: 5;
            width: 300px;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
        }

        .can-container img {
            width: 100%;
            display: block;
        }

        /* Floating Bubbles */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        /* Content Text */
        .content {
            position: absolute;
            left: 10%;
            z-index: 10;
            max-width: 400px;
        }

        .content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .content p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: var(--white);
            color: var(--pepsi-blue);
            padding: 15px 35px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--pepsi-red);
            color: white;
            transform: translateY(-5px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; }
            .content { position: relative; left: 0; margin-bottom: 50px; }
            .can-container { width: 200px; }
            .content h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="bg-text" id="bg-move">PEPSI</div>

        <div class="content" id="text-anim">
            <h1>Thirsty For More</h1>
            <p>Experience the bold, refreshing taste of the classic Pepsi-Cola. Grab a can and live the moment.</p>
            <a href="#" class="btn">Shop Now</a>
        </div>

        <div class="can-container" id="can">
            <img src="https://purepng.com/public/uploads/large/purepng.com-pepsi-canpepsidrinkscolasoda-1411527233291pujit.png" alt="Pepsi Can">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
        // 1. Initial Animation on Load
        const tl = gsap.timeline();

        tl.from(".can-container", {
            y: 500,
            rotation: 45,
            duration: 1.5,
            ease: "expo.out"
        })
        .from("#text-anim h1, #text-anim p, #text-anim .btn", {
            x: -100,
            opacity: 0,
            stagger: 0.2,
            duration: 1,
            ease: "power3.out"
        }, "-=1");

        // 2. Floating Can Idle Animation
        gsap.to("#can", {
            y: "-=30",
            rotation: "+=5",
            duration: 3,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });

        // 3. Mouse Move Parallax
        document.addEventListener("mousemove", (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;

            // Move the Background Text (Slower)
            gsap.to("#bg-move", {
                x: x * 2,
                y: y * 2,
                duration: 1
            });

            // Tilt the Can (Faster)
            gsap.to("#can", {
                rotationY: x * 2,
                rotationX: -y * 2,
                duration: 1
            });
        });

        // 4. Create Random Bubbles
        for (let i = 0; i < 20; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 40 + 10;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.top = `${Math.random() * 100}%`;
            document.body.appendChild(bubble);

            gsap.to(bubble, {
                y: "-=100",
                opacity: 0,
                duration: Math.random() * 3 + 2,
                repeat: -1,
                ease: "none",
                delay: Math.random() * 5
            });
        }
    </script>
</body>
</html>
